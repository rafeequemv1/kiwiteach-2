    <style>
      body {

      .custom-scrollbar {

      /* Force light theme for the question paper area regardless of system settings */
      #printable-paper-area {
        color-scheme: light !important;
      }

      /* --- MASTER PRINT ENGINE --- */
      @media print {
        @page {
          size: A4;
          margin: 0;
        }

        /* Keep top-level containers unclipped in print flow. */
        html, body, #root {
          overflow: visible !important;
          height: auto !important;
          margin: 0 !important;
          padding: 0 !important;
          background: #fff !important;
        }
        .print-app-shell,
        .print-content-shell,
        .print-main-host,
        #printable-paper-area {
          overflow: visible !important;
          height: auto !important;
          max-height: none !important;
        }
        .print-content-shell,
        .print-main-host,
        #printable-paper-area,
        .printable-quiz-page {
          display: block !important;
        }
        .print-main-host {
          padding: 0 !important;
          margin: 0 !important;
          background: #fff !important;
        }
        #printable-paper-area {
          width: 100% !important;
          max-width: none !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        /* Ensure each page within the printable area is sized correctly. */
        .printable-quiz-page {
          width: 210mm !important;
          height: 297mm !important;
          margin: 0 !important;
          page-break-after: always !important;
          break-after: page !important;
          page-break-inside: avoid !important;
          break-inside: avoid !important;
          break-inside: avoid-page !important;
          box-shadow: none !important;
          border: none !important;
          overflow: hidden !important;
        }
        .printable-quiz-page:last-child {
          page-break-after: auto !important;
          break-after: auto !important;
        }

        /* Hide app chrome; print only the paper pages. */
        .no-print {
          display: none !important;
        }

        /* Preserve paper colors/lines in PDF output. */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
      }

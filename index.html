  <head>
    <meta charset="UTF-8" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#ffffff',
              secondary: '#f9fafb',
              accent: '#4f46e5',
              highlight: '#f59e0b',
              'text-primary': '#1f2937',
              'text-secondary': '#6b7280',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'slide-up': 'slideUp 0.5s ease-out',
              'bounce-subtle': 'bounceSubtle 2s infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              bounceSubtle: {
                '0%, 100%': { transform: 'translateY(-3%)' },
                '50%': { transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        margin: 0;
        overflow-x: hidden;
      }
      
      .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
        transition: background 0.2s ease;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }
      
      .custom-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: #e2e8f0 transparent;
      }

      /* --- NATIVE BROWSER PRINT ENGINE --- */
      @media print {
        @page {
          size: A4;
          margin: 0;
        }
        
        body {
          background: white !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        .no-print {
          display: none !important;
        }

        /* --- CORE FIX FOR MULTI-PAGE PDF EXPORT --- */

        /* 1. Un-clip all parent containers */
        /* This is the most important rule. It allows content to flow beyond the screen viewport. */
        body, #root, .overflow-hidden {
          overflow: visible !important;
        }

        /* 2. Let containers grow with the content */
        .h-full, .flex-1 {
          height: auto !important;
        }

        /* 3. Reset the main scrolling area to be a simple block container */
        .overflow-y-auto {
          overflow: visible !important;
          padding: 0 !important;
          margin: 0 !important;
        }
        
        /* 4. Remove on-screen backgrounds and spacing that interfere with printing */
        .bg-slate-300\/50 {
           background: none !important;
        }
        .space-y-12 > :not([hidden]) ~ :not([hidden]) {
           margin-top: 0 !important;
        }
        .pb-24 {
           padding-bottom: 0 !important;
        }

        /* 5. Ensure each virtual page is treated as a real page */
        .printable-quiz-page {
          margin: 0 auto !important;
          box-shadow: none !important;
          page-break-after: always !important; /* This forces a new page in the PDF */
          break-after: page !important;
          break-inside: avoid !important; /* Prevent the browser from splitting our virtual page block */
          overflow: hidden !important;   /* Clip any minor overflow from JS pagination logic. This is the key to preventing blank pages. */
        }

        /* 6. Prevent question content from splitting across a page break */
        .group.text-black {
          break-inside: avoid;
        }
      }
    </style>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KiwiTeach</title>
    <link rel="stylesheet" href="https://esm.sh/katex@0.16.9/dist/katex.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://docs.opencv.org/4.8.0/opencv.js" async></script>
    <script type="text/javascript" src="https://unpkg.com/smiles-drawer@2.0.1/dist/smiles-drawer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#ffffff',
              secondary: '#f9fafb',
              accent: '#4f46e5',
              highlight: '#f59e0b',
              'text-primary': '#1f2937',
              'text-secondary': '#6b7280',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              lato: ['Lato', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'slide-up': 'slideUp 0.5s ease-out',
              'bounce-subtle': 'bounceSubtle 2s infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              bounceSubtle: {
                '0%, 100%': { transform: 'translateY(-3%)' },
                '50%': { transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        margin: 0;
        overflow-x: hidden;
      }
      
      .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
        transition: background 0.2s ease;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }
      
      .custom-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: #e2e8f0 transparent;
      }

      /* Force light theme for the question paper area regardless of system settings */
      #printable-paper-area {
        color-scheme: light !important;
      }

      /* --- MASTER PRINT ENGINE (Visibility Lockdown - Robust) --- */
      @media print {
        @page {
          size: A4;
          margin: 0;
        }

        /* Rule 1: Reset ALL potential container elements to prevent clipping. */
        html, body, #root, div {
          overflow: visible !important;
          position: static !important;
          height: auto !important;
        }
        
        /* Rule 2: Hide everything on the page by default. */
        body * {
          visibility: hidden;
        }

        /* Rule 3: Reveal ONLY the designated printable area and all of its children. */
        #printable-paper-area, #printable-paper-area * {
          visibility: visible;
        }

        /* Rule 4: Position the printable content at the top-left of the print document. */
        #printable-paper-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
        }

        /* Rule 5: Ensure each page within the printable area is sized correctly. */
        .printable-quiz-page {
          width: 210mm !important;
          height: 297mm !important;
          margin: 0 !important;
          page-break-after: always !important;
          box-shadow: none !important;
          border: none !important;
          overflow: hidden !important;
        }

        /* Rule 6: Restore essential positioning for internal page layout. */
        .printable-quiz-page, .printable-quiz-page div[class*="relative"] {
            position: relative !important;
        }
        .printable-quiz-page div[class*="absolute"] {
            position: absolute !important;
        }
        
        /* Rule 7: Hide elements specifically marked as non-printable. */
        .no-print {
          display: none !important;
        }

        /* Rule 8: Force colors and backgrounds to print. */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
